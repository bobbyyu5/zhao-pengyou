<svg viewBox="0 0 1240 900" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC','Inter',sans-serif">
  <defs>
    <linearGradient id="felt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B3D2E"/><stop offset="1" stop-color="#062417"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8CE6B"/><stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <filter id="cardsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="lift" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="7" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="sealsh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#9E2414" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1240" height="900" fill="#04140C"/>

  <!-- ================= PHONE MOCKUP ================= -->
  <g transform="translate(60,40)">
    <rect x="0" y="0" width="380" height="820" rx="40" fill="#000" />
    <rect x="8" y="8" width="364" height="804" rx="34" fill="url(#felt)"/>
    <!-- notch -->
    <rect x="150" y="18" width="80" height="20" rx="10" fill="#000"/>

    <!-- HUD -->
    <g transform="translate(24,54)">
      <rect x="0" y="0" width="332" height="46" rx="14" fill="#0F5238"/>
      <!-- trump chip -->
      <rect x="10" y="8" width="92" height="30" rx="15" fill="#062417"/>
      <text x="24" y="29" fill="#F7F2E7" font-size="13">主</text>
      <text x="44" y="30" fill="#C8341F" font-size="20" font-weight="700">♥</text>
      <text x="66" y="29" fill="#E8CE6B" font-size="13" font-family="'DM Mono',monospace">红桃</text>
      <!-- level -->
      <text x="150" y="22" fill="#C9A227" font-size="11" text-anchor="middle" font-family="'DM Mono',monospace">LEVEL</text>
      <text x="150" y="38" fill="#E8CE6B" font-size="18" text-anchor="middle" font-weight="700" font-family="'DM Mono',monospace">6</text>
      <!-- points -->
      <text x="322" y="20" fill="#9FE3C4" font-size="11" text-anchor="end">抓分 Grabbers</text>
      <text x="322" y="39" fill="#F7F2E7" font-size="18" text-anchor="end" font-weight="700" font-family="'DM Mono',monospace">86<tspan fill="#7Fae98" font-size="13"> / 80</tspan></text>
    </g>

    <!-- opponents -->
    <g font-size="11" fill="#CDEAD9" text-anchor="middle">
      <!-- north (friend) -->
      <circle cx="194" cy="150" r="20" fill="#0F5238" stroke="#C9A227" stroke-width="1.5"/>
      <text x="194" y="154" font-size="15">北</text>
      <text x="194" y="186" >北家</text>
      <g transform="translate(170,196)" fill="#0B3D2E">
        <rect x="0" y="0" width="14" height="20" rx="3" fill="#7A1810"/><rect x="10" y="0" width="14" height="20" rx="3" fill="#7A1810"/><rect x="20" y="0" width="14" height="20" rx="3" fill="#7A1810"/><rect x="30" y="0" width="14" height="20" rx="3" fill="#7A1810"/>
      </g>
      <!-- west -->
      <circle cx="52" cy="360" r="20" fill="#0F5238"/>
      <text x="52" y="364" font-size="15" fill="#CDEAD9">西</text>
      <text x="52" y="396">西家</text>
      <!-- east -->
      <circle cx="336" cy="360" r="20" fill="#0F5238"/>
      <text x="336" y="364" font-size="15" fill="#CDEAD9">东</text>
      <text x="336" y="396">东家</text>
    </g>

    <!-- 友 SEAL stamped on the revealed friend (signature element) -->
    <g transform="translate(214,118) rotate(-8)" filter="url(#sealsh)">
      <rect x="0" y="0" width="46" height="46" rx="8" fill="#C8341F"/>
      <rect x="4" y="4" width="38" height="38" rx="5" fill="none" stroke="#F7F2E7" stroke-width="2"/>
      <text x="23" y="34" fill="#F7F2E7" font-size="26" text-anchor="middle" font-family="'Ma Shan Zheng','Noto Serif SC',serif">友</text>
    </g>

    <!-- trick area: cards played toward center -->
    <g filter="url(#cardsh)">
      <!-- your lead (bottom) -->
      <g transform="translate(168,300)">
        <rect width="44" height="62" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/>
        <text x="7" y="20" fill="#1A1A17" font-size="17" font-weight="700">K</text>
        <text x="22" y="48" fill="#1A1A17" font-size="22" text-anchor="middle">♠</text>
        <circle cx="36" cy="52" r="6" fill="#1F8A5B"/><text x="36" y="56" fill="#fff" font-size="8" text-anchor="middle" font-weight="700">10</text>
      </g>
      <!-- west -->
      <g transform="translate(118,278) rotate(-12)">
        <rect width="44" height="62" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/>
        <text x="7" y="20" fill="#C8341F" font-size="17" font-weight="700">A</text>
        <text x="22" y="48" fill="#C8341F" font-size="22" text-anchor="middle">♦</text>
      </g>
      <!-- north (the called friend card A♦) -->
      <g transform="translate(176,250)">
        <rect width="44" height="62" rx="7" fill="#F7F2E7" stroke="#C9A227" stroke-width="2"/>
        <text x="7" y="20" fill="#C8341F" font-size="17" font-weight="700">A</text>
        <text x="22" y="48" fill="#C8341F" font-size="22" text-anchor="middle">♦</text>
      </g>
      <!-- east -->
      <g transform="translate(226,278) rotate(12)">
        <rect width="44" height="62" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/>
        <text x="7" y="20" fill="#1A1A17" font-size="17" font-weight="700">9</text>
        <text x="22" y="48" fill="#1A1A17" font-size="22" text-anchor="middle">♣</text>
      </g>
    </g>

    <!-- your fanned hand -->
    <g transform="translate(34,470)" filter="url(#cardsh)">
      <g id="h">
        <!-- 10 overlapping cards; one lifted -->
        <g transform="translate(0,18)"><rect width="40" height="58" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/><text x="6" y="19" font-size="15" font-weight="700" fill="#1A1A17">2</text><text x="20" y="44" font-size="19" text-anchor="middle" fill="#1A1A17">♠</text></g>
        <g transform="translate(30,18)"><rect width="40" height="58" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/><text x="6" y="19" font-size="15" font-weight="700" fill="#1A1A17">5</text><text x="20" y="44" font-size="19" text-anchor="middle" fill="#1A1A17">♠</text><circle cx="32" cy="48" r="6" fill="#1F8A5B"/><text x="32" y="52" fill="#fff" font-size="8" text-anchor="middle" font-weight="700">5</text></g>
        <g transform="translate(60,18)"><rect width="40" height="58" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/><text x="6" y="19" font-size="15" font-weight="700" fill="#C8341F">7</text><text x="20" y="44" font-size="19" text-anchor="middle" fill="#C8341F">♥</text></g>
        <!-- lifted/selected -->
        <g transform="translate(90,0)" filter="url(#lift)"><rect width="40" height="58" rx="7" fill="#F7F2E7" stroke="#C9A227" stroke-width="2.5"/><text x="6" y="19" font-size="15" font-weight="700" fill="#C8341F">10</text><text x="20" y="44" font-size="19" text-anchor="middle" fill="#C8341F">♥</text><circle cx="32" cy="48" r="6" fill="#1F8A5B"/><text x="32" y="52" fill="#fff" font-size="8" text-anchor="middle" font-weight="700">10</text></g>
        <g transform="translate(120,18)"><rect width="40" height="58" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/><text x="6" y="19" font-size="15" font-weight="700" fill="#1A1A17">J</text><text x="20" y="44" font-size="19" text-anchor="middle" fill="#1A1A17">♣</text></g>
        <g transform="translate(150,18)"><rect width="40" height="58" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/><text x="6" y="19" font-size="15" font-weight="700" fill="#C8341F">Q</text><text x="20" y="44" font-size="19" text-anchor="middle" fill="#C8341F">♦</text></g>
        <!-- trump rank card (6) highlighted as trump -->
        <g transform="translate(180,18)"><rect width="40" height="58" rx="7" fill="#FBF5E6" stroke="#C9A227" stroke-width="2"/><text x="6" y="19" font-size="15" font-weight="700" fill="#C8341F">6</text><text x="20" y="44" font-size="19" text-anchor="middle" fill="#C8341F">♥</text></g>
        <g transform="translate(210,18)"><rect width="40" height="58" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/><text x="4" y="17" font-size="9" font-weight="700" fill="#C9A227" font-family="'Noto Serif SC',serif">大王</text><text x="20" y="46" font-size="14" text-anchor="middle" fill="#C9A227">★</text></g>
        <g transform="translate(240,18)"><rect width="40" height="58" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/><text x="6" y="19" font-size="15" font-weight="700" fill="#1A1A17">A</text><text x="20" y="44" font-size="19" text-anchor="middle" fill="#1A1A17">♠</text></g>
        <g transform="translate(270,18)"><rect width="40" height="58" rx="7" fill="#F7F2E7" stroke="#E7DEC9"/><text x="6" y="19" font-size="15" font-weight="700" fill="#1A1A17">K</text><text x="20" y="44" font-size="19" text-anchor="middle" fill="#1A1A17">♣</text><circle cx="32" cy="48" r="6" fill="#1F8A5B"/><text x="32" y="52" fill="#fff" font-size="8" text-anchor="middle" font-weight="700">10</text></g>
      </g>
    </g>

    <!-- play button -->
    <g transform="translate(120,602)">
      <rect width="148" height="44" rx="22" fill="url(#brass)"/>
      <text x="74" y="29" text-anchor="middle" fill="#062417" font-size="16" font-weight="700">出牌 Play</text>
    </g>

    <!-- caption -->
    <text x="194" y="690" fill="#7FAE98" font-size="11" text-anchor="middle">轮到你 · 红桃10（点数牌，10分）已选</text>
  </g>

  <!-- ================= DESIGN SYSTEM PANEL ================= -->
  <g transform="translate(500,40)">
    <rect x="0" y="0" width="700" height="820" rx="24" fill="#0A3325"/>

    <!-- wordmark -->
    <text x="36" y="74" fill="#F7F2E7" font-size="46" font-family="'Ma Shan Zheng','Noto Serif SC',serif">找朋友</text>
    <text x="36" y="100" fill="#C9A227" font-size="15" letter-spacing="3" font-family="'DM Mono',monospace">ZHAO PENGYOU · FIND FRIENDS</text>
    <line x1="36" y1="118" x2="664" y2="118" stroke="rgba(247,242,231,0.14)"/>

    <!-- palette -->
    <text x="36" y="150" fill="#9FE3C4" font-size="13" letter-spacing="2">PALETTE</text>
    <g transform="translate(36,162)" font-size="10" font-family="'DM Mono',monospace">
      <g><rect width="96" height="56" rx="10" fill="#0B3D2E" stroke="#1a5a42"/><text x="8" y="74" fill="#CDEAD9">pine felt</text><text x="8" y="86" fill="#7FAE98">#0B3D2E</text></g>
      <g transform="translate(108,0)"><rect width="96" height="56" rx="10" fill="#F7F2E7"/><text x="8" y="74" fill="#CDEAD9">ivory</text><text x="8" y="86" fill="#7FAE98">#F7F2E7</text></g>
      <g transform="translate(216,0)"><rect width="96" height="56" rx="10" fill="#C8341F"/><text x="8" y="74" fill="#CDEAD9">cinnabar</text><text x="8" y="86" fill="#7FAE98">#C8341F</text></g>
      <g transform="translate(324,0)"><rect width="96" height="56" rx="10" fill="#C9A227"/><text x="8" y="74" fill="#CDEAD9">brass</text><text x="8" y="86" fill="#7FAE98">#C9A227</text></g>
      <g transform="translate(432,0)"><rect width="96" height="56" rx="10" fill="#4FA785"/><text x="8" y="74" fill="#CDEAD9">jade</text><text x="8" y="86" fill="#7FAE98">#4FA785</text></g>
      <g transform="translate(540,0)"><rect width="88" height="56" rx="10" fill="#1A1A17"/><text x="8" y="74" fill="#CDEAD9">ink</text><text x="8" y="86" fill="#7FAE98">#1A1A17</text></g>
    </g>

    <!-- card face system -->
    <text x="36" y="312" fill="#9FE3C4" font-size="13" letter-spacing="2">CARD FACES — oversized index for legibility</text>
    <g transform="translate(36,326)" filter="url(#cardsh)">
      <!-- number -->
      <g><rect width="74" height="104" rx="10" fill="#F7F2E7" stroke="#E7DEC9"/><text x="10" y="34" font-size="26" font-weight="700" fill="#1A1A17">9</text><text x="10" y="54" font-size="18" fill="#1A1A17">♠</text><text x="37" y="74" font-size="34" text-anchor="middle" fill="#1A1A17">♠</text></g>
      <!-- point card -->
      <g transform="translate(90,0)"><rect width="74" height="104" rx="10" fill="#F7F2E7" stroke="#E7DEC9"/><text x="10" y="34" font-size="26" font-weight="700" fill="#C8341F">K</text><text x="10" y="54" font-size="18" fill="#C8341F">♥</text><text x="37" y="74" font-size="34" text-anchor="middle" fill="#C8341F">♥</text><circle cx="60" cy="90" r="11" fill="#1F8A5B"/><text x="60" y="94" fill="#fff" font-size="11" text-anchor="middle" font-weight="700">10</text></g>
      <!-- trump rank 6 -->
      <g transform="translate(180,0)"><rect width="74" height="104" rx="10" fill="#FBF5E6" stroke="#C9A227" stroke-width="2.5"/><text x="10" y="34" font-size="26" font-weight="700" fill="#C8341F">6</text><text x="10" y="54" font-size="18" fill="#C8341F">♥</text><text x="37" y="72" font-size="30" text-anchor="middle" fill="#C8341F">♥</text><text x="37" y="96" font-size="9" text-anchor="middle" fill="#C9A227" font-family="'Noto Serif SC',serif">主·级牌</text></g>
      <!-- joker -->
      <g transform="translate(270,0)"><rect width="74" height="104" rx="10" fill="#F7F2E7" stroke="#E7DEC9"/><text x="9" y="30" font-size="13" font-weight="700" fill="#C9A227" font-family="'Noto Serif SC',serif">大王</text><text x="37" y="70" font-size="34" text-anchor="middle" fill="#C9A227">★</text></g>
      <!-- card back -->
      <g transform="translate(360,0)"><rect width="74" height="104" rx="10" fill="#7A1810"/><rect x="6" y="6" width="62" height="92" rx="7" fill="none" stroke="#C9A227" stroke-width="1.5"/><text x="37" y="62" font-size="26" text-anchor="middle" fill="#C9A227" font-family="'Ma Shan Zheng','Noto Serif SC',serif">友</text></g>
    </g>

    <!-- seal + icon + type -->
    <text x="36" y="492" fill="#9FE3C4" font-size="13" letter-spacing="2">SIGNATURE — the 友 seal (app icon + "friend revealed" stamp)</text>
    <g transform="translate(36,508)">
      <!-- big seal -->
      <g filter="url(#sealsh)"><rect width="92" height="92" rx="14" fill="#C8341F"/><rect x="8" y="8" width="76" height="76" rx="9" fill="none" stroke="#F7F2E7" stroke-width="3"/><text x="46" y="68" font-size="52" text-anchor="middle" fill="#F7F2E7" font-family="'Ma Shan Zheng','Noto Serif SC',serif">友</text></g>
      <!-- app icon (felt bg) -->
      <g transform="translate(116,0)"><rect width="92" height="92" rx="20" fill="url(#felt)"/><rect x="20" y="14" width="52" height="64" rx="8" fill="#F7F2E7"/><text x="46" y="60" font-size="34" text-anchor="middle" fill="#C8341F" font-family="'Ma Shan Zheng','Noto Serif SC',serif">友</text></g>
      <text x="116" y="112" fill="#7FAE98" font-size="10" font-family="'DM Mono',monospace">home-screen icon</text>

      <!-- type specimen -->
      <g transform="translate(248,4)">
        <text x="0" y="20" fill="#7FAE98" font-size="10" font-family="'DM Mono',monospace">DISPLAY · Ma Shan Zheng / Noto Serif SC</text>
        <text x="0" y="52" fill="#F7F2E7" font-size="30" font-family="'Noto Serif SC',serif">叫朋友 · 埋底 · 钩到底</text>
        <text x="0" y="78" fill="#7FAE98" font-size="10" font-family="'DM Mono',monospace">UI · Noto Sans SC / Inter</text>
        <text x="0" y="98" fill="#CDEAD9" font-size="15">Create a room, share the code, find your friend.</text>
        <text x="0" y="124" fill="#7FAE98" font-size="10" font-family="'DM Mono',monospace">DATA · DM Mono — points, levels, room code</text>
        <text x="0" y="150" fill="#E8CE6B" font-size="24" font-family="'DM Mono',monospace">86/80 · LVL 6 · ROOM 7K2P</text>
      </g>
    </g>

    <line x1="36" y1="690" x2="664" y2="690" stroke="rgba(247,242,231,0.14)"/>
    <text x="36" y="716" fill="#9FE3C4" font-size="13" letter-spacing="2">SURFACES TO PRODUCE</text>
    <text x="36" y="742" fill="#CDEAD9" font-size="13">Splash · Room create/join · Bidding (live draw) · Bury kitty · Call friend ·</text>
    <text x="36" y="762" fill="#CDEAD9" font-size="13">Trick play · End-of-hand scoring · Table layouts for 4 · 5 · 6 · 7 (then 8–10).</text>
    <text x="36" y="792" fill="#7FAE98" font-size="11" font-style="italic">Spend boldness on the seal; keep everything else quiet and legible.</text>
  </g>
</svg>
